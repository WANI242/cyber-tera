<!DOCTYPE html>
<html lang="en" data-base="">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Page Not Found (404) | CYBER TERA Uganda</title>
    <meta name="description" content="The page you requested could not be found. Use the links below to continue to CYBER TERA's services, case scenarios, or contact page.">
    <meta name="robots" content="noindex, follow">
    <link rel="icon" href="favicon.svg" type="image/svg+xml">
    <link rel="apple-touch-icon" href="favicon.svg">
    <link rel="manifest" href="site.webmanifest">
    <meta name="theme-color" content="#03152d">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap">
    <link rel="stylesheet" href="css/styles.css">
    <style>
        .not-found {
            min-height: 60vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
            padding: 60px 24px;
        }
        .not-found .error-code {
            font-size: clamp(5rem, 18vw, 9rem);
            font-weight: 700;
            color: var(--accent);
            line-height: 1;
            margin: 0;
            letter-spacing: -2px;
        }
        .not-found h1 {
            color: var(--heading);
            font-size: 1.8rem;
            margin: 8px 0 16px 0;
        }
        .not-found p {
            color: var(--muted-strong);
            max-width: 560px;
            margin: 0 auto 24px auto;
            line-height: 1.7;
        }
        .not-found .quick-links {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 12px;
            margin: 24px 0 40px 0;
        }
        .not-found .quick-links a {
            padding: 10px 18px;
            border-radius: var(--radius-sm);
            background: rgba(10, 35, 68, 0.65);
            border: 1px solid rgba(99, 148, 158, 0.3);
            color: var(--text);
            text-decoration: none;
            font-weight: 600;
            transition: background 0.2s, border-color 0.2s, transform 0.2s;
        }
        .not-found .quick-links a:hover,
        .not-found .quick-links a:focus {
            background: rgba(242, 181, 68, 0.12);
            border-color: var(--accent);
            color: var(--accent);
            transform: translateY(-2px);
        }
        .not-found .btn-cta {
            margin-top: 8px;
        }
    </style>
</head>
<body>
    <a class="skip-link" href="#main">Skip to main content</a>
    <header id="site-header"></header>
    <main id="main" class="container">
        <section class="not-found">
            <p class="error-code" aria-hidden="true">404</p>
            <h1>We couldn't find that page</h1>
            <p>The link you followed may be broken, or the page may have been moved. Try one of the options below or head back home.</p>

            <nav class="quick-links" aria-label="Popular pages">
                <a href="index.html">Home</a>
                <a href="pages/services.html">Services</a>
                <a href="pages/cctv.html">CCTV &amp; Security</a>
                <a href="pages/elec.html">Electrical</a>
                <a href="pages/network.html">Networking</a>
                <a href="pages/case-scenarios.html">Case Scenarios</a>
                <a href="pages/faq.html">FAQ</a>
                <a href="blog/index.html">Blog</a>
            </nav>

            <a class="btn-cta" href="pages/gaq.html">Get a quote</a>
        </section>
    </main>
    <footer id="site-footer"></footer>

    <script src="javascript/index.js"></script>
</body>
</html>
